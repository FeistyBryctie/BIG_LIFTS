<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Big Lifts">
<meta name="theme-color" content="#0c0c0e">
<title>Big Lifts</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0c0c0e;--s1:#141416;--s2:#1c1c20;--s3:#242428;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f2f2f7;--text2:#8e8e93;--text3:#48484a;
  --green:#30d158;--red:#ff453a;--blue:#0a84ff;--yellow:#ffd60a;
  --safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;}
#app{position:fixed;inset:0;display:flex;flex-direction:column;}
#screens{flex:1;position:relative;overflow:hidden;}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;transform:translateX(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);will-change:transform;background:var(--bg);}
.screen.active{transform:translateX(0);}
.screen.behind{transform:translateX(-28%);}
.screen-header{padding:calc(var(--safe-top) + 10px) 16px 10px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-bottom:1px solid var(--border);}
.screen-title{font-size:17px;font-weight:600;letter-spacing:-.3px;flex:1;}
.screen-back{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;background:var(--s2);border:none;color:var(--text2);cursor:pointer;flex-shrink:0;}
.screen-action{padding:6px 14px;border-radius:8px;background:var(--s2);border:none;color:var(--text);font-size:13px;font-weight:500;cursor:pointer;white-space:nowrap;}
.screen-action.primary{background:var(--text);color:var(--bg);}
.screen-body{flex:1;overflow-y:auto;overscroll-behavior:contain;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bot)+16px);}
.screen-body::-webkit-scrollbar{display:none;}
#nav{display:flex;background:var(--s1);border-top:1px solid var(--border);padding-bottom:var(--safe-bot);flex-shrink:0;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:10px 0;border:none;background:none;color:var(--text3);cursor:pointer;transition:color .15s;}
.nav-item.active{color:var(--text);}
.nav-icon{width:22px;height:22px;}
.nav-label{font-size:10px;font-weight:500;}
.card{background:var(--s1);border-radius:12px;border:1px solid var(--border);overflow:hidden;margin-bottom:0;}
.list-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:var(--s2);}
.li-main{flex:1;min-width:0;}
.li-title{font-size:15px;font-weight:500;}
.li-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.li-right{color:var(--text3);font-size:13px;font-weight:500;flex-shrink:0;}
.btn{display:flex;align-items:center;justify-content:center;padding:12px 20px;border-radius:10px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;width:100%;}
.btn:active{opacity:.7;}
.btn-p{background:var(--text);color:var(--bg);}
.btn-s{background:var(--s2);color:var(--text);}
.btn-g{background:transparent;border:1px solid var(--border2);color:var(--text);}
.btn-sm{padding:7px 16px;font-size:13px;border-radius:8px;}
.input{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-size:15px;outline:none;font-family:inherit;}
.input:focus{border-color:var(--border2);}
.input::placeholder{color:var(--text3);}
.label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px;}
.field{margin-bottom:14px;}
.section{padding:12px 16px 0;}
.sec-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.sec-title{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.8px;}
.sec-action{font-size:13px;color:var(--text2);background:none;border:none;cursor:pointer;}
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.3px;}
.b-push{background:rgba(255,159,10,.15);color:#ff9f0a;}
.b-pull{background:rgba(10,132,255,.15);color:#0a84ff;}
.b-legs{background:rgba(48,209,88,.15);color:#30d158;}
.b-rest{background:rgba(142,142,147,.15);color:#8e8e93;}
.b-full{background:rgba(191,90,242,.15);color:#bf5af2;}
.b-cardio{background:rgba(255,214,10,.15);color:#ffd60a;}
.stat-row{display:flex;gap:8px;}
.stat-box{flex:1;background:var(--s1);border-radius:10px;border:1px solid var(--border);padding:10px 12px;}
.stat-val{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.stat-lbl{font-size:11px;color:var(--text2);margin-top:2px;font-weight:500;}
.xp-bar{background:var(--s3);border-radius:3px;height:3px;overflow:hidden;margin-top:6px;}
.xp-fill{height:100%;background:var(--text);border-radius:3px;transition:width .5s;}
.wo-table{width:100%;border-collapse:collapse;}
.wo-table th{padding:7px 8px 7px 0;text-align:left;font-size:10px;font-weight:500;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
.wo-table th:not(:first-child){text-align:center;}
.wo-table td{padding:10px 8px 10px 0;border-bottom:1px solid var(--border);vertical-align:top;}
.wo-table td:not(:first-child){text-align:center;font-size:14px;font-weight:500;color:var(--text2);}
.wo-table tr:last-child td{border-bottom:none;}
.ex-name{font-size:14px;font-weight:500;}
.ex-note{font-size:11px;color:var(--text3);margin-top:3px;line-height:1.4;}
.set-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.set-num{width:28px;height:28px;border-radius:7px;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0;}
.set-num.done{background:rgba(48,209,88,.15);color:var(--green);}
.set-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:8px 6px;font-size:14px;font-weight:500;text-align:center;color:var(--text);outline:none;min-width:0;}
.set-input:focus{border-color:var(--border2);}
.set-btn{padding:8px 14px;border-radius:8px;background:var(--s2);border:1px solid var(--border);color:var(--text2);font-size:13px;font-weight:600;cursor:pointer;flex-shrink:0;}
.set-btn.done{background:rgba(48,209,88,.1);border-color:rgba(48,209,88,.3);color:var(--green);}
#coach-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
#coach-messages::-webkit-scrollbar{display:none;}
.msg-user{align-self:flex-end;background:var(--s3);border-radius:14px 14px 4px 14px;padding:10px 14px;font-size:14px;max-width:88%;line-height:1.5;}
.msg-ai{align-self:flex-start;max-width:92%;}
.msg-ai-lbl{font-size:10px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.5px;}
.msg-ai-body{background:var(--s2);border-radius:14px 14px 14px 4px;padding:12px 14px;font-size:14px;line-height:1.6;}
.msg-ai-body h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;color:var(--text2);}
.msg-ai-body p{margin-bottom:8px;}
.msg-ai-body p:last-child{margin-bottom:0;}
.msg-ai-body strong{font-weight:700;}
.msg-ai-body ul,.msg-ai-body ol{padding-left:18px;margin:4px 0 8px;}
.msg-ai-body li{margin-bottom:4px;line-height:1.5;}
.coach-bar{display:flex;gap:8px;padding:10px 16px;padding-bottom:calc(10px + var(--safe-bot));border-top:1px solid var(--border);flex-shrink:0;background:var(--bg);}
.coach-input{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:22px;padding:10px 16px;font-size:15px;color:var(--text);outline:none;font-family:inherit;resize:none;max-height:100px;overflow-y:auto;}
.coach-input:focus{border-color:var(--border2);}
.coach-send{width:38px;height:38px;border-radius:50%;background:var(--text);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;align-self:flex-end;}
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 20px;scrollbar-width:none;flex-shrink:0;}
.chips::-webkit-scrollbar{display:none;}
.chip{flex-shrink:0;padding:7px 14px;border-radius:20px;background:var(--s2);border:1px solid var(--border);color:var(--text2);font-size:13px;cursor:pointer;white-space:nowrap;}
.mode-tabs{display:flex;gap:4px;padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mode-tab{flex:1;padding:7px;border-radius:8px;background:transparent;border:none;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;}
.mode-tab.active{background:var(--s2);color:var(--text);}
.typing{display:flex;gap:4px;align-items:center;padding:12px 14px;background:var(--s2);border-radius:14px 14px 14px 4px;width:fit-content;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--text3);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:.15s;}
.typing span:nth-child(3){animation-delay:.3s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-4px);}}
.day-row{border-bottom:1px solid var(--border);}
.day-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;cursor:pointer;user-select:none;}
.day-name{font-size:15px;font-weight:600;}
.day-focus{font-size:12px;color:var(--text2);margin-top:2px;}
.day-chevron{color:var(--text3);font-size:18px;transition:transform .2s;}
.day-row.open .day-chevron{transform:rotate(90deg);}
.day-body{display:none;padding:0 20px 16px;}
.day-row.open .day-body{display:block;}
.rest-bar{display:none;padding:10px 20px;background:rgba(12,12,14,.97);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);text-align:center;position:sticky;top:0;z-index:10;flex-shrink:0;}
.rest-bar.show{display:block;}
.rest-time{font-size:34px;font-weight:700;letter-spacing:-1px;}
.rest-presets{display:flex;gap:6px;justify-content:center;margin-top:6px;}
.rest-pre{padding:4px 12px;border-radius:6px;background:var(--s2);border:none;color:var(--text2);font-size:12px;font-weight:500;cursor:pointer;}
.wo-hd{padding:12px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0;}
.wo-finish{padding:7px 18px;border-radius:8px;background:var(--green);color:#000;font-size:13px;font-weight:700;border:none;cursor:pointer;}
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:200;display:none;align-items:flex-end;}
.modal-ov.show{display:flex;}
.modal{background:var(--s1);border-radius:20px 20px 0 0;padding:20px 20px calc(20px + var(--safe-bot));width:100%;max-height:88vh;overflow-y:auto;}
.modal-handle{width:36px;height:4px;border-radius:2px;background:var(--s3);margin:0 auto 20px;}
.modal-title{font-size:17px;font-weight:600;margin-bottom:20px;}
.rating-row{display:flex;gap:4px;}
.r-btn{flex:1;padding:8px 0;border-radius:7px;background:var(--s2);border:1px solid var(--border);color:var(--text2);font-size:14px;font-weight:500;cursor:pointer;}
.r-btn.sel{background:var(--s3);border-color:var(--border2);color:var(--text);}
#toast{position:fixed;bottom:calc(var(--safe-bot)+78px);left:50%;transform:translateX(-50%) translateY(10px);background:var(--s3);border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:13px;font-weight:500;white-space:nowrap;opacity:0;transition:all .2s;z-index:500;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty{text-align:center;padding:60px 24px;color:var(--text2);}
.empty-title{font-size:17px;font-weight:600;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:14px;line-height:1.5;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
@keyframes splashPulse{0%,100%{opacity:.25;}50%{opacity:.9;}}
#splash{transition:opacity .5s ease;}
.fade-up{animation:fadeUp .2s ease;}
.pr-row{display:flex;align-items:center;padding:13px 20px;border-bottom:1px solid var(--border);}
.pr-row:last-child{border-bottom:none;}
.pr-name{flex:1;font-size:15px;font-weight:500;}
.pr-val{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.pr-unit{font-size:12px;color:var(--text2);margin-left:3px;}
.today-top{padding:calc(var(--safe-top) + 14px) 16px 6px;}

.ach-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.ach-tile{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
.ach-tile.done{border-color:rgba(255,255,255,0.15);}
.ach-icon{font-size:22px;margin-bottom:4px;}
.ach-name{font-size:10px;font-weight:700;letter-spacing:.3px;line-height:1.3;color:var(--text);}
.ach-desc{font-size:10px;color:var(--text3);margin-top:2px;line-height:1.3;}
.type-bar{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.type-bar:last-child{border-bottom:none;}
.today-hero{background:var(--s1);border-bottom:1px solid var(--border);padding-bottom:16px;}
.hero-info{padding:0 16px;}
.hero-name{font-size:22px;font-weight:700;letter-spacing:-.5px;}
.hero-sub{font-size:12px;color:var(--text2);margin-top:2px;}
.hero-stats{display:flex;gap:6px;padding:10px 16px 0;}
.hero-stat{flex:1;text-align:center;}
.hero-stat-val{font-size:18px;font-weight:700;letter-spacing:-.3px;}
.hero-stat-lbl{font-size:10px;color:var(--text2);margin-top:1px;font-weight:500;}
.hero-xp{padding:10px 16px 0;}
.hero-xp-row{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:4px;}
</style>
</head>
<body>
<div id="splash" style="position:fixed;inset:0;background:#0c0c0e;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;pointer-events:none;">
  <div id="splash-char" style="margin-bottom:18px;"></div>
  <div style="font-size:26px;font-weight:800;letter-spacing:2.5px;color:#f2f2f7;font-family:'Inter',system-ui,sans-serif;">BIG LIFTS</div>
  <div style="font-size:11px;color:#48484a;margin-top:5px;letter-spacing:2px;font-family:'Inter',system-ui,sans-serif;">TRAINING</div>
  <div style="position:absolute;bottom:60px;display:flex;gap:5px;" id="splash-dots">
    <div style="width:5px;height:5px;border-radius:50%;background:#48484a;animation:splashPulse 1.2s infinite;"></div>
    <div style="width:5px;height:5px;border-radius:50%;background:#48484a;animation:splashPulse 1.2s .2s infinite;"></div>
    <div style="width:5px;height:5px;border-radius:50%;background:#48484a;animation:splashPulse 1.2s .4s infinite;"></div>
  </div>
</div>
<div id="app">
  <div id="screens">
    <div class="screen active" id="s-today">
      <div class="screen-body" id="b-today"></div>
    </div>
    <div class="screen" id="s-train">
      <div class="screen-header">
        <div class="screen-title">Train</div>
        <button class="screen-action" onclick="openNewWorkoutModal()">+ New</button>
      </div>
      <div class="screen-body" id="b-train"></div>
    </div>
    <div class="screen" id="s-coach">
      <div class="screen-header" style="border-bottom:none;padding-bottom:8px;">
        <div class="screen-title">Coach</div>
      </div>
      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode('train',this)">Train</button>
        <button class="mode-tab" onclick="setMode('nutrition',this)">Nutrition</button>
        <button class="mode-tab" onclick="setMode('recovery',this)">Recovery</button>
      </div>
      <div id="coach-messages"></div>
      <div class="chips" id="coach-chips"></div>
      <div class="coach-bar">
        <textarea class="coach-input" id="coach-input" placeholder="Ask your coach..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"
          oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'"></textarea>
        <button class="coach-send" onclick="sendMsg()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0c0c0e" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
    <div class="screen" id="s-stats">
      <div class="screen-header">
        <div class="screen-title">Stats</div>
        <button class="screen-action" onclick="openPRModal()">+ PR</button>
      </div>
      <div class="screen-body" id="b-stats"></div>
    </div>
    <div class="screen" id="s-me">
      <div class="screen-header"><div class="screen-title">Profile</div></div>
      <div class="screen-body" id="b-me"></div>
    </div>
    <!-- Sub-screens -->
    <div class="screen" id="s-program">
      <div class="screen-header">
        <button class="screen-back" onclick="pop()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="screen-title" id="prog-title">My Program</div>
        <button class="screen-action primary" onclick="buildProgram()">Build</button>
      </div>
      <div class="screen-body" id="b-program"></div>
    </div>
    <div class="screen" id="s-workout">
      <div class="wo-hd">
        <div>
          <div style="font-weight:600;font-size:16px;" id="wo-name">Workout</div>
          <div style="font-size:12px;color:var(--text2);margin-top:2px;" id="wo-timer">0:00</div>
        </div>
        <button class="wo-finish" onclick="finishWorkout()">Finish</button>
      </div>
      <div class="rest-bar" id="rest-bar">
        <div class="rest-time" id="rest-display">1:30</div>
        <div class="rest-presets">
          <button class="rest-pre" onclick="startRest(60)">1m</button>
          <button class="rest-pre" onclick="startRest(90)">1:30</button>
          <button class="rest-pre" onclick="startRest(120)">2m</button>
          <button class="rest-pre" onclick="startRest(180)">3m</button>
          <button class="rest-pre" onclick="skipRest()">Skip</button>
        </div>
      </div>
      <div class="screen-body" id="b-workout"></div>
    </div>
    <div class="screen" id="s-log">
      <div class="screen-header">
        <button class="screen-back" onclick="pop()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="screen-title">Workout Log</div>
      </div>
      <div class="screen-body" id="b-log"></div>
    </div>
    <div class="screen" id="s-checkin">
      <div class="screen-header">
        <button class="screen-back" onclick="pop()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="screen-title">Daily Check-in</div>
      </div>
      <div class="screen-body" id="b-checkin"></div>
    </div>
    <div class="screen" id="s-log-detail">
      <div class="screen-header">
        <button class="screen-back" onclick="pop()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="screen-title" id="log-detail-title">Session</div>
      </div>
      <div class="screen-body" id="b-log-detail"></div>
    </div>
  </div>
  <nav id="nav">
    <button class="nav-item active" id="ni-today" onclick="go('today')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
      <span class="nav-label">Today</span>
    </button>

<script>
// STATE
const DB='blt_v2',CK='blt_v2_chat';
function def(){return{name:'Bryce',xp:0,level:1,streak:0,lastLog:null,workouts:[],log:[],prs:{},program:null,checkins:[],apiKey:'',mode:'train',unlocked:[]};}
let S=(()=>{try{const r=localStorage.getItem(DB);if(r)return Object.assign({},def(),JSON.parse(r));}catch(e){}return def();})();
let CH=(()=>{try{const r=localStorage.getItem(CK);if(r)return JSON.parse(r);}catch(e){}return[];})();

function save(){
  try{const d=JSON.stringify(S);localStorage.setItem(DB,d);localStorage.setItem(DB+'_bk',d);IDB.save(d);}catch(e){}
  try{localStorage.setItem(CK,JSON.stringify(CH.slice(-80)));}catch(e){}
}
['pagehide','beforeunload'].forEach(e=>window.addEventListener(e,save));
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='hidden')save();});
setInterval(save,15000);

// IDB
const IDB={db:null,
  open(){return new Promise((res,rej)=>{const r=indexedDB.open('BLV2',1);r.onupgradeneeded=e=>e.target.result.createObjectStore('d',{keyPath:'k'});r.onsuccess=e=>{this.db=e.target.result;res();};r.onerror=rej;});},
  async save(data){if(!this.db)await this.open().catch(()=>{});if(!this.db)return;try{const tx=this.db.transaction('d','readwrite');tx.objectStore('d').put({k:'m',v:data,ts:Date.now()});}catch(e){}},
  async load(){if(!this.db)await this.open().catch(()=>{});if(!this.db)return null;return new Promise(res=>{try{const tx=this.db.transaction('d','readonly'),r=tx.objectStore('d').get('m');r.onsuccess=()=>res(r.result?.v||null);r.onerror=()=>res(null);}catch(e){res(null);}});}
};

// XP — extended to 20 defined levels, extrapolates beyond
const LVL=[0,100,250,500,900,1500,2400,3700,5500,8000,12000,17000,25000,35000,48000,65000,88000,118000,156000,204000];
function xpForLvl(l){const idx=l-1;return idx<LVL.length?LVL[idx]:Math.round(LVL[LVL.length-1]*Math.pow(1.35,idx-(LVL.length-1)));}
function awardXP(n){
  S.xp+=n;
  let lv=1;for(let i=1;;i++){if(S.xp>=xpForLvl(i+1))lv=i+1;else break;}
  S.level=lv;checkAchievements();save();
}
function xpPct(){const c=xpForLvl(S.level),nx=xpForLvl(S.level+1);return Math.min(1,(S.xp-c)/(nx-c));}

function checkStreak(){
  const t=new Date().toLocaleDateString(),y=new Date(Date.now()-86400000).toLocaleDateString();
  if(S.lastLog===y)S.streak++;else if(S.lastLog!==t)S.streak=1;
  S.lastLog=t;
}

function exportData(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({s:S,ch:CH,_v:2,_d:new Date().toISOString()},null,2)],{type:'application/json'}));
  a.download='big-lifts-'+new Date().toLocaleDateString('en-US',{month:'2-digit',day:'2-digit',year:'2-digit'}).replace(/\//g,'-')+'.json';
  a.click();toast('Backup saved');
}
function importData(){
  const inp=document.createElement('input');inp.type='file';inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);S=Object.assign({},def(),d.s||d);if(d.ch)CH=d.ch;save();renderAll();toast('Data restored');}catch(err){alert('Invalid backup file');}};
    r.readAsText(f);};inp.click();
}
</script>
<script>
// WORKOUT LOGIC
let AW=null,woTick=null,restTick=null,restSec=0;

function startWorkout(id){
  const w=S.workouts.find(x=>x.id===id);if(!w)return;
  AW={id:'s_'+Date.now(),name:w.name,exs:w.exercises.map(e=>({...e,sets:[]})),t0:Date.now()};
  push('workout');renderWorkout();startWoTimer();
}
function startProgramDay(i){
  const d=S.program?.week?.[i];if(!d||!d.exercises?.length)return;
  const DN=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  AW={id:'p_'+i+'_'+Date.now(),name:(S.program.name||'Program')+' — '+(d.focus||DN[i]),
      exs:d.exercises.map(e=>({...e,sets:[]})),t0:Date.now(),progDay:i};
  push('workout');renderWorkout();startWoTimer();
}
function startWoTimer(){
  clearInterval(woTick);
  woTick=setInterval(()=>{
    const el=document.getElementById('wo-timer');if(!el||!AW)return;
    const s=Math.floor((Date.now()-AW.t0)/1000);
    el.textContent=Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
  },1000);
}
function completeSet(ei,si){
  if(!AW)return;
  const w=parseFloat(document.getElementById('w_'+ei+'_'+si)?.value)||0;
  const r=parseInt(document.getElementById('r_'+ei+'_'+si)?.value)||0;
  if(!w||!r){toast('Enter weight and reps');return;}
  AW.exs[ei].sets[si]={w,r,done:true};
  const ex=AW.exs[ei],key=ex.name.toLowerCase();
  if(!S.prs[key]||w>S.prs[key].weight)S.prs[key]={name:ex.name,weight:w,reps:r,date:new Date().toLocaleDateString()};
  renderWorkout();
  const rs=parseRest(ex.rest)||90;startRest(rs);
}
function parseRest(s){if(!s)return 0;const p=String(s).split(':');return p.length===2?+p[0]*60+ +p[1]:+p[0]||0;}
function startRest(s){
  clearInterval(restTick);restSec=s;
  const bar=document.getElementById('rest-bar'),disp=document.getElementById('rest-display');
  if(bar)bar.classList.add('show');
  const tick=()=>{if(disp)disp.textContent=Math.floor(restSec/60)+':'+String(restSec%60).padStart(2,'0');
    if(restSec<=0){clearInterval(restTick);if(bar)bar.classList.remove('show');beep();}};
  tick();restTick=setInterval(()=>{restSec--;tick();},1000);
}
function skipRest(){clearInterval(restTick);const b=document.getElementById('rest-bar');if(b)b.classList.remove('show');}
function beep(){try{const c=new AudioContext(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=880;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+.4);o.start();o.stop(c.currentTime+.4);}catch(e){}}
function finishWorkout(){
  if(!AW)return;clearInterval(woTick);clearInterval(restTick);
  const dur=Math.floor((Date.now()-AW.t0)/1000);
  const sets=AW.exs.reduce((n,e)=>n+e.sets.filter(s=>s?.done).length,0);
  const wType=AW.progDay!=null?(S.program?.week?.[AW.progDay]?.type||'workout'):'workout';
  const exDetail=AW.exs.map(e=>({name:e.name,sets:e.sets.filter(s=>s?.done)}));
  S.log.unshift({id:AW.id,name:AW.name,type:wType,date:new Date().toLocaleDateString(),dur,sets,exercises:exDetail,ts:Date.now()});
  checkStreak();awardXP(sets*5+10);
  const wasProg=String(AW.id).startsWith('p_');AW=null;save();pop();
  if(wasProg)renderProgram();else renderTrain();
  toast(`+${sets*5+10} XP — ${sets} sets logged`);
}
function savePR(){
  const n=document.getElementById('pr-ex')?.value?.trim();
  const w=parseFloat(document.getElementById('pr-wt')?.value);
  const r=parseInt(document.getElementById('pr-rp')?.value)||1;
  if(!n||!w){toast('Fill in exercise and weight');return;}
  S.prs[n.toLowerCase()]={name:n,weight:w,reps:r,date:new Date().toLocaleDateString()};
  save();checkAchievements();closeM('m-pr');renderStats();toast('PR saved');
}
function saveWorkout(name,exercises){S.workouts.unshift({id:'w_'+Date.now(),name,exercises});save();}
function deleteWorkout(id){if(!confirm('Delete this workout?'))return;S.workouts=S.workouts.filter(w=>w.id!==id);save();renderTrain();}
function saveProgram(d){
  S.program={name:d.name||'My Program',week:d.week,coachNote:d.coachNote||'',built:new Date().toLocaleDateString()};
  save();checkAchievements();renderProgram();toast('Program saved');
}
</script>
<script>
// AI COACH — TOOL CALLING
const TOOLS=[
  {name:'save_program',description:'Save a 7-day weekly training program. Use when athlete asks for a full week, split, or program.',
   input_schema:{type:'object',required:['name','week'],properties:{
     name:{type:'string'},
     week:{type:'array',minItems:7,maxItems:7,items:{type:'object',required:['type','focus','exercises'],properties:{
       type:{type:'string',enum:['push','pull','legs','full','rest','cardio','muaythai','deload']},
       focus:{type:'string'},
       exercises:{type:'array',items:{type:'object',required:['name','sets','reps'],properties:{
         name:{type:'string'},sets:{type:'integer'},reps:{type:'string'},
         rest:{type:'string',description:'e.g. "2:00"'},note:{type:'string'}
       }}}
     }}},
     coachNote:{type:'string'}
   }}},
  {name:'save_workout',description:'Save a single workout template.',
   input_schema:{type:'object',required:['name','exercises'],properties:{
     name:{type:'string'},
     exercises:{type:'array',items:{type:'object',required:['name','sets','reps'],properties:{
       name:{type:'string'},sets:{type:'integer'},reps:{type:'string'},rest:{type:'string'},note:{type:'string'}
     }}}
   }}},
  {name:'log_pr',description:'Log a personal record.',
   input_schema:{type:'object',required:['exercise','weight'],properties:{
     exercise:{type:'string'},weight:{type:'number'},reps:{type:'integer'}
   }}}
];

function runTool(name,input){
  if(name==='save_program'){
    input.week=input.week.map(d=>({...d,exercises:(d.exercises||[]).filter(e=>e.name&&!e.name.toUpperCase().includes('SUPPLEMENT')&&!e.name.toUpperCase().includes('VITAMIN'))}));
    saveProgram(input);return`Program "${input.name}" saved.`;
  }
  if(name==='save_workout'){saveWorkout(input.name,input.exercises||[]);renderTrain();return`Workout "${input.name}" saved.`;}
  if(name==='log_pr'){const k=input.exercise.toLowerCase();S.prs[k]={name:input.exercise,weight:input.weight,reps:input.reps||1,date:new Date().toLocaleDateString()};save();renderStats();return`PR: ${input.exercise} ${input.weight}lbs`;}
  return'ok';
}

function getSys(){
  const prs=Object.values(S.prs).slice(0,8).map(p=>`${p.name}:${p.weight}lbs`).join(', ')||'none';
  const ci=S.checkins[0];
  const ciStr=ci?`Energy ${ci.energy}/5, Sleep ${ci.sleep}/5, Soreness ${ci.soreness}/5, Mood ${ci.mood}/5`:'no recent check-in';
  const prog=S.program?`Program: ${S.program.name}`:'No program';
  const ctx=`Athlete: ${S.name||'Bryce'} | Level ${S.level} | ${S.streak}-day streak | PRs: ${prs} | ${ciStr} | ${prog}`;
  const base=`You are an elite coach. Direct, specific, no fluff. Real numbers. ${ctx}`;
  if(S.mode==='nutrition')return base+'\n\nFocus: nutrition, macros, meal timing, supplementation. Specific numbers and protocols.';
  if(S.mode==='recovery')return base+'\n\nFocus: recovery, sleep, mobility, injury prevention, hormones. Evidence-based.';
  return base+'\n\nFocus: training and programming. When asked for a full week program, use save_program. For single workouts, use save_workout. Include rest times and coaching notes per exercise.';
}

async function sendMsg(){
  const inp=document.getElementById('coach-input');
  const text=inp?.value?.trim();if(!text)return;
  if(!S.apiKey){const k=prompt('Enter Anthropic API key:');if(k?.trim()){S.apiKey=k.trim();save();}else return;}
  inp.value='';inp.style.height='auto';
  addMsg('user',text);
  CH.push({role:'user',content:text});
  const typing=addTyping();
  try{
    const msgs=CH.slice(-40);
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:8000,system:getSys(),tools:TOOLS,messages:msgs})});
    const data=await res.json();
    typing.remove();
    if(data.error){addMsg('ai','Error: '+data.error.message);return;}
    const texts=(data.content||[]).filter(b=>b.type==='text');
    const tools=(data.content||[]).filter(b=>b.type==='tool_use');
    if(texts.length)addMsg('ai',texts.map(b=>b.text).join('\n'));
    if(tools.length){
      const results=tools.map(t=>({type:'tool_result',tool_use_id:t.id,content:runTool(t.name,t.input)}));
      CH.push({role:'assistant',content:data.content});
      CH.push({role:'user',content:results});
      save();
      const t2=addTyping();
      const r2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:2000,system:getSys(),tools:TOOLS,messages:CH.slice(-40)})});
      const d2=await r2.json();t2.remove();
      const t2txt=(d2.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
      if(t2txt)addMsg('ai',t2txt);
      CH.push({role:'assistant',content:d2.content});
    } else {CH.push({role:'assistant',content:data.content});}
    save();scrollChat();
  }catch(err){typing?.remove();addMsg('ai','Connection error. Check your API key.');}
}

async function buildProgram(){
  if(!S.apiKey){const k=prompt('Enter Anthropic API key:');if(k?.trim()){S.apiKey=k.trim();save();}else return;}
  const pb=document.getElementById('b-program');
  if(pb)pb.innerHTML='<div class="empty"><div class="empty-title">Building...</div><div class="empty-sub">Takes a few seconds</div></div>';
  const prs=Object.values(S.prs).slice(0,8).map(p=>`${p.name}:${p.weight}lbs`).join(', ')||'none';
  const ci=S.checkins[0];const ciStr=ci?`Energy ${ci.energy}/5, Sleep ${ci.sleep}/5`:'no check-in';
  const recent=CH.slice(-16).map(m=>{
    const c=Array.isArray(m.content)?m.content.filter(b=>b.type==='text').map(b=>b.text).join(' '):m.content;
    return m.role+': '+String(c||'').substring(0,250);
  }).join('\n');
  const prompt=`Build a 7-day training program for ${S.name||'Bryce'}.\nPRs: ${prs}\nCheck-in: ${ciStr}\nLevel: ${S.level}\n${recent?'Recent context:\n'+recent:''}\nUse save_program. Include rest times and coaching notes per exercise.`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:8000,
        system:'You are an elite strength coach. Always use the save_program tool. Include rest times and a coaching note per exercise.',
        tools:TOOLS,tool_choice:{type:'any'},messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    const tu=(data.content||[]).find(b=>b.type==='tool_use'&&b.name==='save_program');
    if(tu){runTool('save_program',tu.input);awardXP(25);}
    else if(pb)pb.innerHTML='<div class="empty"><div class="empty-title">Build failed</div><div class="empty-sub">Try asking the coach directly in the Coach tab</div></div>';
  }catch(err){if(pb)pb.innerHTML='<div class="empty"><div class="empty-title">Connection error</div></div>';}
}

function setMode(m,btn){S.mode=m;save();document.querySelectorAll('.mode-tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');renderChips();}

function addMsg(role,content){
  const c=document.getElementById('coach-messages');if(!c)return;
  const el=document.createElement('div');el.className='fade-up';
  if(role==='user'){el.className+=' msg-user';el.textContent=content;}
  else{
    el.innerHTML=`<div class="msg-ai-lbl">COACH</div><div class="msg-ai-body">${fmtMsg(content)}</div>`;
    el.className='msg-ai fade-up';
  }
  c.appendChild(el);scrollChat();
}
function fmtMsg(t){
  // Group consecutive bullet lines into <ul>
  t=t.replace(/((?:^[-•*] .+\n?)+)/gm,m=>'<ul>'+m.replace(/^[-•*] (.+)$/gm,'<li>$1</li>')+'</ul>');
  // Numbered lists
  t=t.replace(/((?:^\d+\. .+\n?)+)/gm,m=>'<ol>'+m.replace(/^\d+\. (.+)$/gm,'<li>$1</li>')+'</ol>');
  return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/^#{1,3} (.+)$/gm,'<h3>$1</h3>')
    .replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>')
    .replace(/^/,'<p>').replace(/$/,'</p>');
}
function addTyping(){
  const c=document.getElementById('coach-messages');
  const el=document.createElement('div');el.className='msg-ai fade-up';
  el.innerHTML='<div class="msg-ai-lbl">COACH</div><div class="typing"><span></span><span></span><span></span></div>';
  c?.appendChild(el);scrollChat();return el;
}
function scrollChat(){const c=document.getElementById('coach-messages');if(c)setTimeout(()=>c.scrollTop=c.scrollHeight,50);}
</script>
<script>
// NAVIGATION
const stack=[];
function go(tab){
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('ni-'+tab)?.classList.add('active');
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active','behind'));
  document.getElementById('s-'+tab)?.classList.add('active');
  document.getElementById('nav').style.display='';
  stack.length=0;stack.push(tab);
  ({today:renderToday,train:renderTrain,coach:renderCoach,stats:renderStats,me:renderMe})[tab]?.();
}
function push(screen){
  const cur=document.getElementById('s-'+stack[stack.length-1]);
  if(cur)cur.classList.add('behind');
  stack.push(screen);
  const next=document.getElementById('s-'+screen);
  if(next){next.classList.remove('behind');next.classList.add('active');}
  if(screen==='workout')document.getElementById('nav').style.display='none';
}
function pop(){
  if(stack.length<=1)return;
  const cur=document.getElementById('s-'+stack.pop());
  cur?.classList.remove('active','behind');
  const prev=document.getElementById('s-'+stack[stack.length-1]);
  if(prev){prev.classList.remove('behind');prev.classList.add('active');}
  document.getElementById('nav').style.display='';
}
function toast(msg){
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>el.classList.remove('show'),2500);
}
function openM(id){document.getElementById(id)?.classList.add('show');}
function closeM(id){document.getElementById(id)?.classList.remove('show');}
function openPRModal(){openM('m-pr');}
function openNewWorkoutModal(){
  document.getElementById('wm-name').value='';
  document.getElementById('wm-rows').innerHTML='';
  addExRow();openM('m-workout');
}
function addExRow(){
  const c=document.getElementById('wm-rows'),r=document.createElement('div');
  r.style.cssText='display:flex;gap:6px;margin-bottom:8px;';
  r.innerHTML=`<input class="input" placeholder="Exercise" style="flex:2;padding:10px 12px;font-size:14px;">
    <input class="input" type="number" placeholder="3" style="width:48px;padding:10px 8px;font-size:14px;text-align:center;">
    <input class="input" placeholder="8-10" style="flex:1;padding:10px 8px;font-size:14px;text-align:center;">
    <button onclick="this.parentElement.remove()" style="width:30px;border-radius:7px;background:var(--s3);border:none;color:var(--text2);cursor:pointer;font-size:18px;flex-shrink:0;">×</button>`;
  c.appendChild(r);

    <div class="card">${prHTML}</div></div>`;
  if(wts.length>=2)drawWtChart(document.getElementById('wt-canvas'),wts);

function drawWtChart(canvas,data){
  if(!canvas)return;
  const ctx=canvas.getContext('2d'),W=canvas.width,H=canvas.height,pad=10;
  const vals=data.map(d=>d.weight);
  const mn=Math.min(...vals)-3,mx=Math.max(...vals)+3;
  ctx.clearRect(0,0,W,H);
  // Grid lines
  ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
  for(let i=0;i<3;i++){const y=pad+i*(H-pad*2)/2;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();}
  // Fill
  const xOf=i=>pad+i/(data.length-1)*(W-pad*2);
  const yOf=v=>H-pad-(v-mn)/(mx-mn)*(H-pad*2);
  ctx.beginPath();
  data.forEach((d,i)=>i===0?ctx.moveTo(xOf(i),yOf(d.weight)):ctx.lineTo(xOf(i),yOf(d.weight)));
  ctx.lineTo(xOf(data.length-1),H-pad);ctx.lineTo(xOf(0),H-pad);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,0.04)';ctx.fill();
  // Line
  ctx.beginPath();
  data.forEach((d,i)=>i===0?ctx.moveTo(xOf(i),yOf(d.weight)):ctx.lineTo(xOf(i),yOf(d.weight)));
  ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;ctx.lineJoin='round';ctx.stroke();
  // End dots
  [[0,data[0].weight],[data.length-1,data[data.length-1].weight]].forEach(([i,v])=>{
    ctx.beginPath();ctx.arc(xOf(i),yOf(v),3,0,Math.PI*2);
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.fill();
  });
}

      </div>
    </div>`;
  }).join('');
  b.innerHTML=summary+`<div style="padding-bottom:20px;">${exHTML}</div>`;
}

// ICON GENERATOR
function genIcon(size){
  const c=document.createElement('canvas');c.width=size;c.height=size;
  const ctx=c.getContext('2d');
  // Dark rounded background
  const rad=size*0.22;
  ctx.fillStyle='#0c0c0e';
  ctx.beginPath();ctx.moveTo(rad,0);ctx.lineTo(size-rad,0);
  ctx.arc(size-rad,rad,rad,-Math.PI/2,0);ctx.lineTo(size,size-rad);
  ctx.arc(size-rad,size-rad,rad,0,Math.PI/2);ctx.lineTo(rad,size);
  ctx.arc(rad,size-rad,rad,Math.PI/2,Math.PI);ctx.lineTo(0,rad);
  ctx.arc(rad,rad,rad,Math.PI,-Math.PI/2);ctx.closePath();ctx.fill();
  // Barbell
  const cx=size/2,cy=size*0.42;
  const bH=size*0.07,bW=size*0.52;
  const pH=size*0.30,pW=size*0.065;
  ctx.fillStyle='#f2f2f7';
  // Bar
  ctx.fillRect(cx-bW/2,cy-bH/2,bW,bH);
  // Left plate
  ctx.fillRect(cx-bW/2-pW,cy-pH/2,pW,pH);
  // Right plate
  ctx.fillRect(cx+bW/2,cy-pH/2,pW,pH);
  // Collars
  ctx.fillStyle='rgba(242,242,247,0.5)';
  ctx.fillRect(cx-bW/2+bW*0.1,cy-pH*0.26,size*0.035,pH*0.52);
  ctx.fillRect(cx+bW/2-bW*0.1-size*0.035,cy-pH*0.26,size*0.035,pH*0.52);
  // Text
  ctx.fillStyle='rgba(242,242,247,0.92)';
  ctx.font=`700 ${Math.round(size*0.14)}px Inter,system-ui,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('BIG LIFTS',cx,cy+pH/2+size*0.13);
  return c.toDataURL('image/png');
}

// PWA SETUP
function setupPWA(){
  try{
    const icon=genIcon(192);
    // Apple touch icon
    let al=document.querySelector('link[rel="apple-touch-icon"]');
    if(!al){al=document.createElement('link');al.rel='apple-touch-icon';document.head.appendChild(al);}
    al.href=icon;
    // Web manifest
    const manifest={name:'Big Lifts Training',short_name:'Big Lifts',
      display:'standalone',background_color:'#0c0c0e',theme_color:'#0c0c0e',
      orientation:'portrait-primary',start_url:'.',
      icons:[{src:icon,sizes:'192x192',type:'image/png'},{src:genIcon(512),sizes:'512x512',type:'image/png'}]};
    const blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    let ml=document.querySelector('link[rel="manifest"]');
    if(!ml){ml=document.createElement('link');ml.rel='manifest';document.head.appendChild(ml);}
    ml.href=URL.createObjectURL(blob);
  }catch(e){}
}
